<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
table { width: 100%; border-collapse: collapse; font-family: var(--sl-font-mono); font-size: 13px; }
td { padding: 8px 6px; border-bottom: 1px solid rgba(47,44,42,0.12); vertical-align: middle; }
td:first-child { width: 38%; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
td:nth-child(2) { width: 12%; }
.chip { width: 28px; height: 28px; border-radius: 6px; display:inline-block; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); }
.hex { opacity: 0.7; font-size: 11px; }
</style></head><body><div class="card">
<table>
<tr><td>--sl-bg</td><td><span class="chip" style="background:#F1EDE4"></span></td><td>page background <span class="hex">#F1EDE4</span></td></tr>
<tr><td>--sl-bg-dark</td><td><span class="chip" style="background:#466956"></span></td><td>hero / signage bg <span class="hex">#466956</span></td></tr>
<tr><td>--sl-fg</td><td><span class="chip" style="background:#2F2C2A"></span></td><td>body text on cream <span class="hex">#2F2C2A</span></td></tr>
<tr><td>--sl-accent</td><td><span class="chip" style="background:#DB4F4C"></span></td><td>CTA / price tag <span class="hex">#DB4F4C</span></td></tr>
<tr><td>--sl-accent-ink</td><td><span class="chip" style="background:#A54236"></span></td><td>menu headings on warm <span class="hex">#A54236</span></td></tr>
<tr><td>--sl-action</td><td><span class="chip" style="background:#466956"></span></td><td>primary button <span class="hex">#466956</span></td></tr>
<tr><td>--sl-hairline</td><td><span class="chip" style="background:#2F2C2A;opacity:0.18"></span></td><td>dividers on cream</td></tr>
</table>
</div></body></html>

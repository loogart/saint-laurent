<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.b { font: 700 12px/1 var(--sl-font-mono); text-transform: uppercase; letter-spacing: 0.08em; padding: 8px 14px; border-radius: 999px; }
.b.red { background: var(--sl-red); color: var(--sl-cream); }
.b.forest { background: var(--sl-forest); color: var(--sl-cream); }
.b.cream { background: var(--sl-cream-warm); color: var(--sl-forest); box-shadow: inset 0 0 0 2px var(--sl-forest); }
.b.red-700 { background: var(--sl-red-700); color: var(--sl-cream); }
.b.rotated { transform: rotate(-6deg); font-size: 14px; padding: 10px 18px; box-shadow: var(--sl-shadow-sm); }
.lab { font-family: var(--sl-font-mono); font-size: 10px; opacity:0.55; text-transform:uppercase; letter-spacing:0.06em; margin-top: 10px; }
</style></head><body><div class="card">
<div class="row">
  <span class="b red">Chef's Special</span>
  <span class="b forest">Open Late</span>
  <span class="b cream">Sold Out</span>
  <span class="b red-700">New · Tabarnak</span>
  <span class="b red rotated">SMOKED DAILY</span>
</div>
<div class="lab">Badges \u00b7 "Smoked" sticker variant rotates ~\u22126\u00b0 for hand-placed feel</div>
</div></body></html>

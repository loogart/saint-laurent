<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 0; }
.row { display:flex; flex-direction: column; }
.cell { padding: 28px 24px; display:flex; align-items:center; justify-content:center; min-height: 140px; box-sizing: border-box; }
.cell.cream { background: var(--sl-cream); }
.cell.forest { background: var(--sl-forest); }
.cell.red { background: var(--sl-red); }
.cell img { max-width: 360px; max-height: 100px; width:auto; }
</style></head><body><div class="card"><div class="row">
  <div class="cell cream"><img src="../assets/logo-horizontal.svg" alt="Saint Laurent horizontal"></div>
  <div class="cell forest"><img src="../assets/logo-horizontal-inverse.svg" alt="Saint Laurent horizontal inverse"></div>
  <div class="cell red"><img src="../assets/logo-horizontal-inverse.svg" alt="Saint Laurent horizontal on red"></div>
</div></div></body></html>

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.row { display: flex; align-items: flex-end; gap: 10px; margin-top: 10px; }
.box { background: var(--sl-forest); color: var(--sl-cream); font-family: var(--sl-font-mono); font-size: 10px; font-weight: 700; display:flex; align-items:flex-end; justify-content:center; padding:2px; }
.lab { font-family: var(--sl-font-mono); font-size: 10px; opacity:0.6; text-align:center; margin-top:4px; text-transform:uppercase; letter-spacing:0.06em; }
</style></head><body><div class="card">
<div class="row">
  <div><div class="box" style="width:4px;height:20px"></div><div class="lab">4</div></div>
  <div><div class="box" style="width:8px;height:24px"></div><div class="lab">8</div></div>
  <div><div class="box" style="width:12px;height:28px"></div><div class="lab">12</div></div>
  <div><div class="box" style="width:16px;height:32px"></div><div class="lab">16</div></div>
  <div><div class="box" style="width:24px;height:40px"></div><div class="lab">24</div></div>
  <div><div class="box" style="width:32px;height:48px"></div><div class="lab">32</div></div>
  <div><div class="box" style="width:48px;height:60px"></div><div class="lab">48</div></div>
  <div><div class="box" style="width:64px;height:72px"></div><div class="lab">64</div></div>
  <div><div class="box" style="width:96px;height:88px"></div><div class="lab">96</div></div>
  <div><div class="box" style="width:128px;height:104px">128</div><div class="lab">128</div></div>
</div>
</div></body></html>

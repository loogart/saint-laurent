<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 0; overflow: hidden; border-radius: 16px; }
.shot { position: relative; height: 320px; background: var(--sl-forest); color: var(--sl-cream); overflow: hidden; }
.shot img { position:absolute; inset:0; width: 100%; height:100%; object-fit: cover; opacity: 0.75; }
.poster { position: relative; z-index: 1; padding: 24px; display: flex; flex-direction: column; justify-content: space-between; height: 100%; box-sizing: border-box; }
.eyebrow { font: 700 12px/1.1 var(--sl-font-mono); text-transform: uppercase; letter-spacing: 0.1em; }
.big { font: 700 108px/0.9 var(--sl-font-display); text-transform: uppercase; }
.foot { font: 700 12px/1.1 var(--sl-font-mono); text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.85; }
</style></head><body><div class="card">
<div class="shot">
  <img src="../assets/photo-smoked-meat-poutine.png" alt="">
  <div class="poster">
    <div class="eyebrow">Saint Smoked Meat l'gros</div>
    <div class="big">JUICY AF</div>
    <div class="foot">…et le pickle.</div>
  </div>
</div>
</div></body></html>

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.sw { display:flex; flex-direction:column; justify-content:flex-end; padding:14px; height:140px; border-radius: 12px; font-family: var(--sl-font-mono); font-weight:700; font-size: 12px; letter-spacing:0.04em; }
.sw .name { font-size: 13px; text-transform: uppercase; }
.sw .hex { opacity:0.75; margin-top: 4px; font-size: 11px; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
</style></head><body><div class="card">
<div class="grid">
  <div class="sw" style="background:#466956;color:#F1EDE4"><div class="name">Forest</div><div class="hex">#466956</div></div>
  <div class="sw" style="background:#F1EDE4;color:#2F2C2A;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.08)"><div class="name">Cream</div><div class="hex">#F1EDE4</div></div>
  <div class="sw" style="background:#DB4F4C;color:#F1EDE4"><div class="name">Red</div><div class="hex">#DB4F4C</div></div>
</div>
</div></body></html>

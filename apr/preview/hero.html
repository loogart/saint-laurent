<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 0; background: var(--sl-cream); }
.hero { position: relative; min-height: 420px; background: var(--sl-forest); color: var(--sl-cream); padding: 56px 40px 80px; overflow:hidden; }
.hero::before {
  content: "";
  position: absolute; inset: 0;
  background:
    linear-gradient(rgba(241,237,228,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(241,237,228,0.06) 1px, transparent 1px);
  background-size: 32px 32px;
}
.eyebrow { position: relative; font: 700 13px/1 var(--sl-font-mono); text-transform: uppercase; letter-spacing: 0.14em; opacity:0.9; }
.big { position: relative; font: 700 120px/0.9 var(--sl-font-display); text-transform: uppercase; margin-top: 14px; letter-spacing: 0.004em; }
.sub { position: relative; font: 700 16px/1.5 var(--sl-font-mono); max-width: 460px; margin-top: 16px; opacity: 0.88; }
.row { position: relative; margin-top: 28px; display:flex; gap: 14px; }
.btn { font: 700 13px/1 var(--sl-font-mono); text-transform: uppercase; letter-spacing: 0.08em; padding: 14px 20px; border: 0; border-radius: 8px; cursor: pointer; }
.p { background: var(--sl-red); color: var(--sl-cream); }
.g { background: transparent; color: var(--sl-cream); box-shadow: inset 0 0 0 2px rgba(241,237,228,0.7); }
.check { position: absolute; left: 0; right: 0; bottom: 0; height: 16px; background:
  linear-gradient(90deg,
    var(--sl-red) 0 12.5%, var(--sl-cream) 12.5% 25%,
    var(--sl-red) 25% 37.5%, var(--sl-cream) 37.5% 50%,
    var(--sl-red) 50% 62.5%, var(--sl-cream) 62.5% 75%,
    var(--sl-red) 75% 87.5%, var(--sl-cream) 87.5% 100%); }
.mark { position: absolute; right: 40px; top: 48px; width: 90px; transform: rotate(45deg); opacity: 0.95; }
</style></head><body><div class="card"><div class="hero">
  <img src="../assets/logomark-inverse.svg" class="mark" alt="">
  <div class="eyebrow">LEDUC, AB · MONTRÉAL ✦ LEDUC</div>
  <div class="big">Montreal Soul,<br>Alberta Soil.</div>
  <div class="sub">Smoked meat stacked high, steamies snapped hot, poutine worth the drive. We saved a seat for you.</div>
  <div class="row">
    <button class="btn p">Order the Saint →</button>
    <button class="btn g">See the menu</button>
  </div>
  <div class="check"></div>
</div></div></body></html>

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.row { display: flex; align-items: flex-end; gap: 14px; }
.swatch { width: 90px; height: 90px; background: var(--sl-forest); display: flex; align-items:flex-end; justify-content: center; padding-bottom: 6px; color: var(--sl-cream); font-family: var(--sl-font-mono); font-size: 10px; font-weight: 700; text-transform:uppercase; letter-spacing:0.06em;}
.lab { font-family: var(--sl-font-mono); font-size: 10px; opacity:0.6; text-align:center; margin-top:6px; text-transform:uppercase; letter-spacing:0.06em;}
</style></head><body><div class="card">
<div class="row">
  <div><div class="swatch" style="border-radius:4px">4</div><div class="lab">xs — hairline corners</div></div>
  <div><div class="swatch" style="border-radius:8px">8</div><div class="lab">sm — buttons</div></div>
  <div><div class="swatch" style="border-radius:16px">16</div><div class="lab">md — input</div></div>
  <div><div class="swatch" style="border-radius:24px">24</div><div class="lab">lg — card</div></div>
  <div><div class="swatch" style="border-radius:32px">32</div><div class="lab">xl — photo card</div></div>
  <div><div class="swatch" style="border-radius:999px">∞</div><div class="lab">full — dots only</div></div>
</div>
</div></body></html>

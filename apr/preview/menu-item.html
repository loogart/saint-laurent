<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>

.item { display: flex; justify-content: space-between; align-items: flex-start; padding: 14px 0; border-bottom: 4px solid var(--sl-red-700); }

.desc { font: 700 14px/1.1 var(--sl-font-mono-alt); color: var(--sl-forest); margin-top: 4px; }
.price { font: 700 44px/0.9 var(--sl-font-display); color: var(--sl-forest); }
</style></head><body><div class="card">
<div class="item">
  <div><div class="name">SMOKED MEAT sandwich</div><div class="desc">hand-cut rye, yellow mustard, double-smoked brisket</div></div>

</div>
<div class="item">
  <div><div class="name">Poutine</div><div class="desc">it's poutsssinne, not POOteen, tabarnak.</div></div>

</div>
</div></body></html>

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.sw { display:flex; flex-direction:column; justify-content:flex-end; padding:10px; height:80px; border-radius: 8px; font-family: var(--sl-font-mono); font-weight:700; font-size: 11px; }
.sw .name { font-size: 11px; text-transform: uppercase; }
.sw .hex { opacity:0.75; margin-top: 2px; font-size: 10px; }
.row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 10px; }
.label { font-family: var(--sl-font-mono); font-size: 10px; text-transform:uppercase; letter-spacing:0.08em; color: var(--sl-ink); opacity:0.6; margin: 8px 0 4px; }
</style></head><body><div class="card">
<div class="label">Forest scale</div>
<div class="row">
  <div class="sw" style="background:#2F4238;color:#F1EDE4"><div class="hex">900</div></div>
  <div class="sw" style="background:#3A553E;color:#F1EDE4"><div class="hex">800</div></div>
  <div class="sw" style="background:#466956;color:#F1EDE4"><div class="hex">Forest</div></div>
  <div class="sw" style="background:#5A816C;color:#F1EDE4"><div class="hex">600</div></div>
  <div class="sw" style="background:#87A597;color:#2F2C2A"><div class="hex">400</div></div>
  <div class="sw" style="background:#F1EDE4;color:#2F2C2A;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.08)"><div class="hex">Cream</div></div>
</div>
<div class="label">Red scale</div>
<div class="row">
  <div class="sw" style="background:#BD3D2B;color:#F1EDE4"><div class="hex">900</div></div>
  <div class="sw" style="background:#874139;color:#F1EDE4"><div class="hex">800</div></div>
  <div class="sw" style="background:#A54236;color:#F1EDE4"><div class="hex">700</div></div>
  <div class="sw" style="background:#C84D3B;color:#F1EDE4"><div class="hex">600</div></div>
  <div class="sw" style="background:#DB4F4C;color:#F1EDE4"><div class="hex">Red</div></div>
  <div class="sw" style="background:#FCF4DF;color:#2F2C2A;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.08)"><div class="hex">Warm</div></div>
</div>
<div class="label">Neutrals</div>
<div class="row">
  <div class="sw" style="background:#030303;color:#F1EDE4"><div class="hex">Black</div></div>
  <div class="sw" style="background:#1A1919;color:#F1EDE4"><div class="hex">Char</div></div>
  <div class="sw" style="background:#2F2C2A;color:#F1EDE4"><div class="hex">Ink</div></div>
  <div class="sw" style="background:#F4F4F4;color:#2F2C2A;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.08)"><div class="hex">Cream dim</div></div>
  <div class="sw" style="background:#F1EDE4;color:#2F2C2A;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.08)"><div class="hex">Cream</div></div>
  <div class="sw" style="background:#FCF4DF;color:#2F2C2A;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.08)"><div class="hex">Warm</div></div>
</div>
</div></body></html>
